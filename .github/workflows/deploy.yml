name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Create artifact
        run: zip -r app.zip . -x "*.git*"

      - name: Upload to S3
        run: |
          aws s3 cp app.zip s3://${{ secrets.S3_BUCKET }}/app-${{ github.sha }}.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Deploy to EC2
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["aws s3 cp s3://${{ secrets.S3_BUCKET }}/app-${{ github.sha }}.zip /tmp/","cd /tmp && unzip -o app-${{ github.sha }}.zip","sudo cp /tmp/index.html /var/www/html/index.html","sudo systemctl restart httpd"]}' \
            --region ap-southeast-2

  rollback:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Auto Rollback
        run: |
          PREV=$(aws s3 ls s3://${{ secrets.S3_BUCKET }}/ | sort | tail -2 | head -1 | awk '{print $4}')
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[\"aws s3 cp s3://${{ secrets.S3_BUCKET }}/$PREV /tmp/\",\"cd /tmp && unzip -o $PREV\",\"sudo cp /tmp/index.html /var/www/html/index.html\",\"sudo systemctl restart httpd\"]}" \
            --region ap-southeast-2

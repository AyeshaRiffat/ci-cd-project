name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Create artifact
        run: zip -r app.zip . -x "*.git*"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 cp app.zip s3://${{ secrets.S3_BUCKET }}/app-${{ github.sha }}.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["aws s3 cp s3://${{ secrets.S3_BUCKET }}/app-${{ github.sha }}.zip /tmp/","cd /tmp && unzip -o app-${{ github.sha }}.zip","sudo cp /tmp/index.html /var/www/html/index.html","sudo systemctl restart httpd"]}' \
            --region ${{ secrets.AWS_REGION }}

  rollback:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Auto Rollback
        run: |
          PREV=$(aws s3 ls s3://${{ secrets.S3_BUCKET }}/ | sort | tail -2 | head -1 | awk '{print $4}')
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[\"aws s3 cp s3://${{ secrets.S3_BUCKET }}/$PREV /tmp/\",\"cd /tmp && unzip -o $PREV\",\"sudo cp /tmp/index.html /var/www/html/index.html\",\"sudo systemctl restart httpd\"]}" \
            --region ${{ secrets.AWS_REGION }}
